<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Form Builder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Advanced Form Builder</h1>
        <nav>
            <ul>
                <li><a href="#">Login</a></li>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Forms Management</a></li>
                <li><a href="#">Admin Panel</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="login">
            <h2>Login</h2>
            <form action="#" method="post">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </section>
        <section id="dashboard">
            <h2>Dashboard</h2>
            <p>Welcome to your dashboard!</p>
        </section>
        <section id="forms-management">
            <h2>Forms Management</h2>
            <p>Manage your forms here.</p>
        </section>
        <section id="admin-panel">
            <h2>Admin Panel</h2>
            <p>Admin functionalities go here.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Form Builder Application</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
